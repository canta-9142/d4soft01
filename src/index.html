<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas ToDo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="menubar">
      <button id="menuButton" class="icon-button" type="button" title="キャンバスメニュー" aria-label="キャンバスメニュー">☰</button>
      <div class="canvas-title">
        <input id="canvasTitleInput" type="text" aria-label="キャンバスタイトル" disabled />
      </div>
      <div class="toolbar">
        <button id="addTaskButton" type="button">タスク</button>
        <button id="connectModeButton" type="button">接続</button>
        <button id="searchButton" type="button">検索</button>
        <button id="undoButton" type="button" title="取り消し">↶</button>
        <button id="redoButton" type="button" title="やり直し">↷</button>
      </div>
      <div id="statusSummary" class="status-summary"></div>
      <div id="modeSummary" class="mode-summary"></div>
      <button id="saveButton" class="primary" type="button">保存</button>
    </header>

    <main id="canvasViewport" class="canvas-viewport">
      <div id="canvasWorld" class="canvas-world">
        <svg id="connectionLayer" class="connection-layer" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L8,3 z" fill="#9AA0A6"></path>
            </marker>
            <marker id="arrowSelected" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L8,3 z" fill="#2F6FEB"></path>
            </marker>
          </defs>
        </svg>
        <div id="taskLayer" class="task-layer"></div>
      </div>
      <div id="emptyState" class="empty-state" hidden>
        <h1>キャンバスがありません</h1>
        <button id="emptyCreateCanvasButton" class="primary" type="button">新規キャンバス</button>
      </div>
    </main>

    <section id="searchPanel" class="panel" hidden aria-label="検索とフィルター">
      <label>
        検索
        <input id="searchTextInput" type="search" autocomplete="off" />
      </label>
      <label>
        ステータス
        <select id="statusFilterSelect">
          <option value="">絞り込みなし</option>
          <option value="NotStarted">未着手</option>
          <option value="InProgress">進行中</option>
          <option value="Completed">完了済み</option>
        </select>
      </label>
      <div class="panel-row">
        <span id="depthBaseLabel">基準: 未設定</span>
        <button id="setDepthBaseButton" type="button">基準に設定</button>
      </div>
      <label>
        最大深さ
        <input id="maxDepthInput" type="number" min="0" step="1" />
      </label>
      <label class="check-row">
        <input id="depthEnabledInput" type="checkbox" />
        深さフィルター
      </label>
      <div id="filterError" class="field-error"></div>
      <div class="panel-actions">
        <button id="clearFiltersButton" type="button">クリア</button>
        <button id="closeSearchButton" type="button">閉じる</button>
      </div>
    </section>

    <nav id="canvasMenu" class="context-menu" hidden></nav>
    <nav id="taskMenu" class="context-menu" hidden></nav>
    <div id="toast" class="toast" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
